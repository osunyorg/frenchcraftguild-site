theme: osuny
_merge: deep
params:
  debug:
    productionUrl: https://www.frenchcraftguild.fr
  breadcrumb:
    position: after-hero-title
  home:
    head:
      title: site
  logo:
    header: "/assets/images/logo-horizontal.svg"
    footer: "/assets/images/logo.svg"
  menu:
    primary:
      level_2:
        title:
          active: true
  organizations:
    prefer_image_over_logo: true
    single:
      backlinks: true
  pages:
    index:
      options:
        summary: false
  projects:
    index: 
      layout: alternate
      truncate_description: 0
    single:
      meta:
        options:
          reading_time: false
  posts:
    index:
      layout: list
  toc:
    force_offcanvas: true
  image_sizes:
    sections:
      organizations:
        item:
          mobile:   400
          tablet:   500
          desktop:  600
        layouts:
          grid:
            mobile:   400
            tablet:   500
            desktop:  550